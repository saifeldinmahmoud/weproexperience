<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WePro Experience</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
      background: #000;
    }

    /* Background */
    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.25);
    }

    /* Content */
    .content {
      position: relative;
      z-index: 5;
      height: 100vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;
      padding: 20px;
    }

    /* 🔥 ULTRA HERO LOGO */
    .logo img {
      width: min(520px, 90vw);
      height: auto;
      object-fit: contain;

      filter: drop-shadow(0 0 50px #d6a34c);
      animation:
        glow 2.5s infinite alternate,
        float 4s ease-in-out infinite;
    }

    /* Glow animation */
    @keyframes glow {
      from {
        filter: drop-shadow(0 0 20px #d6a34c);
      }
      to {
        filter: drop-shadow(0 0 90px #d6a34c);
      }
    }

    /* Floating animation */
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    /* Typing */
    .typing {
      font-size: 82px;
      letter-spacing: 5px;
      text-transform: uppercase;
      white-space: nowrap;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glow {
      color: #f5d089;
      text-shadow:
        0 0 10px rgba(214, 163, 76, 0.7),
        0 0 30px rgba(214, 163, 76, 0.5),
        0 0 60px rgba(214, 163, 76, 0.3);
      animation: glowPulse 2.5s infinite ease-in-out;
    }

    @keyframes glowPulse {
      0%, 100% {
        text-shadow:
          0 0 10px rgba(214, 163, 76, 0.5),
          0 0 30px rgba(214, 163, 76, 0.3);
      }
      50% {
        text-shadow:
          0 0 20px rgba(214, 163, 76, 0.9),
          0 0 60px rgba(214, 163, 76, 0.6);
      }
    }

    /* Email */
    .email {
      font-size: 24px;
      color: #eee;
      text-decoration: none;
      border-bottom: 2px solid rgba(214, 163, 76, 0.4);
      transition: 0.3s ease;
    }

    .email:hover {
      color: #d6a34c;
      border-bottom: 2px solid #d6a34c;
    }

    .line {
      width: 240px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d6a34c, transparent);
      margin: 40px 0;
    }

    /* ================= RESPONSIVE ================= */

    @media (max-width: 768px) {
      .logo img {
        width: min(320px, 80vw);
      }

      .typing {
        font-size: 42px;
      }

      .email {
        font-size: 18px;
      }
    }

    @media (max-width: 480px) {
      .logo img {
        width: min(240px, 85vw);
      }

      .typing {
        font-size: 32px;
      }

      .line {
        width: 160px;
      }
    }
  </style>
</head>

<body>

  <!-- Background -->
  <img src="/bg.jpg" class="bg" />
  <div class="overlay"></div>

  <div class="content">

    <!-- 🔥 HERO LOGO -->
    <div class="logo">
      <img src="icon.png" alt="WePro Icon">
    </div>

    <!-- Typing -->
    <div id="display" class="typing"></div>

    <div class="line"></div>

  </div>

  <script>
    const texts = [
      { text: "COMING SOON", type: "glow", link: false },
      { text: "info@weproexperience.com", type: "email", link: true }
    ];

    const display = document.getElementById("display");

    let textIndex = 0;
    let charIndex = 0;

    function type() {
      const current = texts[textIndex];

      if (charIndex === 0) {
        display.className = "typing " + current.type;

        if (current.link) {
          display.innerHTML = `<a href="mailto:${current.text}" class="email"></a>`;
        } else {
          display.innerHTML = "";
        }
      }

      if (charIndex < current.text.length) {

        if (current.link) {
          const a = display.querySelector("a");
          a.innerHTML += current.text.charAt(charIndex);
        } else {
          display.innerHTML += current.text.charAt(charIndex);
        }

        charIndex++;
        setTimeout(type, 120);

      } else {
        setTimeout(erase, 2000);
      }
    }

    function erase() {
      const current = texts[textIndex];

      if (charIndex > 0) {

        if (current.link) {
          const a = display.querySelector("a");
          a.innerHTML = current.text.substring(0, charIndex - 1);
        } else {
          display.innerHTML = current.text.substring(0, charIndex - 1);
        }

        charIndex--;
        setTimeout(erase, 60);

      } else {
        textIndex = (textIndex + 1) % texts.length;
        setTimeout(type, 400);
      }
    }

    window.onload = type;
  </script>

</body>

</html>
